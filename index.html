<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>满配高级VM混淆器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:system-ui,sans-serif;padding:20px}
.container{max-width:1000px;margin:0 auto}
.title{font-size:22px;color:#0ff;margin-bottom:20px}
.btns{display:flex;gap:14px;margin-bottom:20px}
button,label{padding:12px 26px;background:#0ff;color:#000;border:none;border-radius:999px;font-weight:bold;cursor:pointer}
#file{display:none}
.editor{display:flex;gap:12px;height:480px}
textarea{flex:1;background:#111;color:#fff;border:1px solid #0ff6;border-radius:10px;padding:12px;font-size:14px}
</style>
</head>
<body>
<div class="container">
    <div class="title">满配高级VM混淆器（全套保护）</div>
    <div class="btns">
        <label for="file">📁 上传Lua文件</label>
        <button id="start">🔒 开始全套混淆</button>
        <button id="download">💾 下载混淆后文件</button>
    </div>
    <div class="editor">
        <textarea id="input" placeholder="等待上传文件..."></textarea>
        <textarea id="output" readonly placeholder="混淆完成后显示..."></textarea>
    </div>
    <input type="file" id="file" accept=".lua">
</div>

<script>
const fileInput = document.getElementById('file');
const startBtn = document.getElementById('start');
const downloadBtn = document.getElementById('download');
const input = document.getElementById('input');
const output = document.getElementById('output');

// 上传文件
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { input.value = reader.result; };
    reader.readAsText(file);
};

// 全套高级混淆（拉满保护）
startBtn.onclick = () => {
    let code = input.value.trim();
    if (!code) return;

    // 1. 变量深度乱名
    const varMap = {};
    let varId = 0;
    const kw = new Set(["and","break","do","else","elseif","end","false","for","function","if","in","local","nil","not","or","repeat","return","then","true","until","while","print","table","string","math","ipairs","pairs","tonumber","tostring","bit","bit32","setmetatable","getmetatable","rawset","rawget"]);
    code = code.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, (name) => {
        if (kw.has(name)) return name;
        if (!varMap[name]) varMap[name] = '_$' + (varId++).toString(36);
        return varMap[name];
    });

    // 2. 字符串强加密
    code = code.replace(/"([\s\S]*?)"/g, (_, str) => {
        const key = Math.floor(Math.random() * 127) + 1;
        let enc = '';
        for (let i = 0; i < str.length; i++) {
            enc += String.fromCharCode(str.charCodeAt(i) ^ key);
        }
        const b64 = btoa(enc);
        return `(function()local k=${key};local d="";local s="${b64}";for i=1,#s do d=d..string.char(bit.bxor(string.byte(s,i),k))end;return d;end)()`;
    });

    // 3. 数字表达式化
    code = code.replace(/\b(\d+)\b/g, (num) => {
        if (Math.random() > 0.5) return num;
        const a = Math.floor(Math.random() * 1000);
        const b = a - Number(num);
        return `(${a}-${b})`;
    });

    // 4. 控制流平坦 + VM虚拟机
    const lines = code.split('\n').filter(l => l.trim());
    let vmCode = 'do\nlocal pc=1\nlocal _$_end=' + (lines.length + 1) + '\nwhile true do\n';
    lines.forEach((line, idx) => {
        vmCode += `  if pc==${idx+1} then\n    ${line}\n    pc=${idx+2}\n  end\n`;
    });
    vmCode += '  if pc==_$_end then break end\nend\nend';

    // 5. 反调试 + 壳
    const final = `-- 高级VM混淆 + 全套保护
local function _$_anti()if not bit then error("debug")end end
_$_anti()
${vmCode}
`;

    output.value = final;
};

// 下载文件
download.onclick = () => {
    const content = output.value;
    if (!content) return;
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'obfuscated.lua';
    a.click();
    URL.revokeObjectURL(url);
};
</script>
</body>
</html>
